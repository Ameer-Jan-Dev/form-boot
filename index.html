<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      @media (max-width: 650px) {
        #container-section {
          max-width: 400px !important;
        }
      }

      @media (max-width: 430px) {
        #container-section {
          max-width: 360px !important;
        }
      }

      @media (max-width: 380px) {
        #container-section {
          max-width: 350px !important;
        }
      }
    </style>
    <title>Form</title>
  </head>
  <body style="background-color: aliceblue; margin: 20px auto">
    <section
      id="container-section"
      style="
        display: flex;
        justify-content: center;
        flex-direction: column;
        max-width: 600px;
        width: 100%;
        border: 0;
        border-radius: 10px;
        box-shadow: 0 0px 15px rgba(0, 0, 0, 0.1);
      "
      class="container bg-white pb-2 my-auto mx-auto"
    >
      <h1 class="text-center text-primary fs-1 pt-4 fw-bolder">
        Form in Bootstrap
      </h1>
      <p class="mb-4 text-center text-muted">
        Please fill in this form to register for our service
      </p>

      <form>
        <div class="pb-3">
          <label class="form-label" for="name">First Name</label>
          <input
            type="text"
            id="name"
            required
            placeholder="Enter your first name"
            class="form-control"
          />
        </div>
        <div class="pb-3">
          <label class="form-label" for="lname">Last Name</label>
          <input
            type="text"
            id="lname"
            required
            placeholder="Enter your last name"
            class="form-control"
          />
        </div>
        <div class="pb-3">
          <label class="form-label" for="lname">Last Name</label>
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            required
            placeholder="Enter your email"
            class="form-control"
          />
        </div>
        <div class="pb-2">
          <label class="form-label" for="lname">Last Name</label>
          <label for="pwd">Password</label>
          <input
            type="password"
            id="pwd"
            required
            placeholder="Create a password"
            class="form-control"
          />
        </div>
        <div class="form-check">
          <label class="form-check-label" for="btn">
            <input class="form-check-input" type="checkbox" id="btn" />
            Receive updates about our services
          </label>
        </div>
        <div>
          <h2>Membership Type</h2>
          <label class="form-check-label">
            <input
              class="form-check-input"
              type="radio"
              name="pricing-plan"
              value="standard"
            />
            Standard
          </label>
        </div>

        <div>
          <label class="form-check-label">
            <input
              class="form-check-input"
              type="radio"
              name="pricing-plan"
              value="popular"
            />
            Popular
          </label>
        </div>
        <div class="pb-2 pt-2">
          <label class="form-label" class="form-label" for="pic"
            >Profile Picture</label
          >
          <input class="form-control" type="file" id="pic" />
        </div>
        <input
          class="btn btn-outline-primary my-4 pb-2 w-50 mx-auto d-grid"
          type="submit"
          value="Submit"
        />
      </form>
    </section>
  </body>
</html>
